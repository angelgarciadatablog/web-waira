<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Producto — WAIRA & DR</title>
  <meta name="description" content="Detalle de producto, tallas, precio y cómo hacer tu pedido.">
  <!-- Tipografías + estilos globales existentes -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Estilos específicos de la ficha (reutilizan tokens globales) */
    .product-wrap{
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:28px;
      grid-template-areas:
        "crumbs crumbs"
        "gallery meta";
    }
    .crumbs{ grid-area: crumbs; margin:6px 0 16px; }
    .crumbs a{ color:var(--muted); text-decoration:underline; }

    .gallery{
      grid-area: gallery;
      display:flex; flex-direction:column; gap:12px;
    }
    .gallery-main{
      width:100%;
      /* sin altura fija: el contenedor se adapta al alto natural de la imagen */
      background:var(--champagne);
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      padding:8px; /* pequeño marco para contener la imagen cuando no llena todo */
    }
    .gallery-main img{
      width:100%;
      height:auto;          /* muestra la imagen entera */
      max-height:70vh;      /* evita que crezca demasiado en pantallas pequeñas */
      object-fit:contain;   /* SIN recorte */
      object-position:center;
      display:block;
      margin:0 auto;
    }

    .thumbs{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
    .thumb{
      border:1px solid var(--line); border-radius:12px;
      overflow:hidden; cursor:pointer; background:#fff;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      display:flex; align-items:center; justify-content:center;
      padding:4px;
    }
    .thumb:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow);
      border-color:color-mix(in oklab, var(--brand) 30%, var(--line));
    }
    .thumb img{
      width:100%; height:90px; object-fit:contain; object-position:center; /* también sin recorte */
    }

    .meta{ grid-area: meta; }
    .meta h1{ margin:0 0 8px; }
    .price{ font-weight:700; font-size:18px; margin:6px 0; }
    .dim{ color:var(--muted); margin:2px 0 10px; }
    .chips{ margin-top:8px; }
    .section{ margin-top:18px; padding-top:14px; border-top:1px solid var(--line); }
    .note{ font-size:13px; color:var(--muted); }

    @media (max-width:900px){
      .product-wrap{
        grid-template-columns:1fr;
        gap:20px;
        grid-template-areas:
          "crumbs"
          "gallery"
          "meta";
      }
      .thumb img{ height:76px; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <strong class="logo">WAIRA & DR</strong>
  </header>

  <main class="product-wrap">
    <div class="crumbs"><a href="./">← Volver al catálogo</a></div>

    <div class="gallery">
      <div class="gallery-main"><img id="mainImg" alt="Producto" /></div>
      <div id="thumbs" class="thumbs"></div>
    </div>

    <article class="meta">
      <h1 id="title">Producto</h1>
      <div id="price" class="price"></div>
      <div id="taco" class="dim"></div>

      <div class="section">
        <strong>Tallas</strong>
        <div id="tallas" class="chips" style="margin-top:6px"></div>
        <div id="stock" class="note" style="margin-top:6px"></div>
      </div>

      <div class="section">
        <strong>Descripción</strong>
        <p id="desc" class="note" style="margin-top:4px"></p>
      </div>

      <div class="section">
        <strong>Cómo hacer tu pedido</strong>
        <!-- Sin botón; solo texto con el número -->
        <p id="ctaText" class="note" style="margin-top:8px"></p>
      </div>

      <div class="section">
        <strong>Envíos</strong>
        <ul class="note" style="margin:6px 0 0 18px">
          <li>Lima Metropolitana: consultar tarifas (moto/envío programado).</li>
          <li>Provincias: Olva/Serpost/Los Andes según destino.</li>
          <li>Tiempo de preparación: 1–2 días hábiles.</li>
        </ul>
      </div>
    </article>
  </main>

  <script src="producto.js"></script>
</body>
</html>
